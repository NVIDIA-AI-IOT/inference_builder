# ------------------------------
# C-RADIOv3-H Test (manual)
# ------------------------------
test:cradio:
  stage: test
  image: python:3.12-slim
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_BUILDKIT: "1"
    NGC_CLI_VERSION: "3.50.0"
    MODEL_REPO: "/tmp/model-repo"
  before_script:
    # Install build dependencies for Python packages
    - apt-get update && apt-get install -y --no-install-recommends python3-dev python3-pip bash gcc g++ make cmake libssl-dev ffmpeg file net-tools
    # Setup Docker with BuildKit support
    - *setup_docker_buildkit
    # Setup NGC CLI
    - *setup_ngc_cli
    # Setup Python dependencies
    - python3 --version
    - pip3 install --upgrade pip --break-system-packages || pip3 install --upgrade pip
    - |-
      if [ -f requirements.txt ]; then
        pip install -r <(grep -v '^opencv-python' requirements.txt) --break-system-packages || pip install -r requirements.txt
      else
        echo "No requirements.txt found, skipping"
      fi
    # Create model repository directory
    - mkdir -p "$MODEL_REPO" && chmod 777 "$MODEL_REPO"
  script:
    - echo "Running C-RADIOv3-H + PeopleNet pipeline tests..."
    - cd builder/tests
    - export PATH="/opt/ngc-cli:$PATH"
    - chmod +x run_tests.sh
    - ./run_tests.sh --config ../samples/cradio/test_config.json -t "*" --log-dir cradio_logs --output cradio_report.json
    - echo "C-RADIOv3-H tests completed"
  after_script:
    - echo "Cleaning up Docker images..."
    - docker images | grep test-inference_builder | awk '{print $3}' | xargs -r docker rmi -f || true
    - echo "Cleaning up downloaded models..."
    - rm -rf /tmp/model-repo || true
    - echo "Cleanup completed"
  artifacts:
    name: "cradio-test-results-$CI_COMMIT_SHORT_SHA"
    paths:
      - builder/tests/cradio_logs/
      - builder/tests/cradio_report.json
    when: always
    expire_in: 1 week
  timeout: 4h
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  tags:
    - os/linux
    - type/docker
    - gpu
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  allow_failure: true

