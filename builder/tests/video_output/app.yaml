name: "test-app"
model_repo: "/workspace/models"

input:
  - name: "seed"
    data_type: TYPE_INT32
    dims: [ 1 ]

output:
  - name: "frames_file"
    data_type: TYPE_CUSTOM_VIDEO_OUTPUT_FILE
    dims: [ -1, -1, 3 ]
  - name: "frames_asset"
    data_type: TYPE_CUSTOM_VIDEO_OUTPUT_ASSET
    dims: [ -1, -1, 3 ]

models:
- name: dummy
  backend: dummy
  max_batch_size: 1
  input:
  - name: dummy_input
    data_type: TYPE_FP32
    dims: [ 1 ]
  output:
  - name: output
    data_type: TYPE_FP32
    dims: [ 1 ]
  preprocessors:
  - kind: "custom"
    name: "video-output-frame-generator"
    input: ["seed"]
    output: ["dummy_input", "frames_file", "frames_asset"]
    config: { "num_frames": 4, "height": 96, "width": 160 }

routes: {
  ':["seed"]': 'dummy',
  'dummy:["frames_file", "frames_asset"]': ':'
}
