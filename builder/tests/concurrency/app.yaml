name: "test-app"
model_repo: "/workspace/models"


server:
  responders:
    infer:
      operation: inference
      requests:
        InferenceRequest: >
          {
            {% if request.text is not none %}
            "text": [
              {% for item in request.text %}
                {{ item|tojson }}{% if not loop.last %}, {% endif %}
              {% endfor %}
            ]
            {% endif %}
          }
      responses:
        InferenceResponse: >
          {
            "data": [
              {% for item in response.output %} {
                "index": {{loop.index0}},
                "output": {{item | tojson}}
              } {% if not loop.last %}, {% endif %} {% endfor %} ]
          }
    healthy_ready:
      operation: health_ready_v1_health_ready_get

input:
  - name: "text"
    data_type: TYPE_STRING
    dims: [ -1 ]

output:
  - name: "output"
    data_type: TYPE_FP32
    dims: [ 1 ]

models:
- name: dummy
  backend: dummy
  max_batch_size: 1
  input:
  - name: "input"
    data_type: TYPE_STRING
    dims: [ -1 ]
  output:
  - name: output
    data_type: TYPE_FP32
    dims: [ 1 ]
  preprocessors:
  - kind: "custom"
    name: "request-counter"
    input: ["text"]
    output: ["input","request_id"]
  postprocessors:
  - kind: "custom"
    name: "response-checker"
    input: ["output", "request_id"]
    output: ["output"]
